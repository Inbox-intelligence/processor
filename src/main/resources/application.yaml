server:
  port: 8081

spring:
  application:
    name: processor

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}
    email-processing:
      exchange: ${RABBITMQ_PROCESSING_EXCHANGE}
      queue: ${RABBITMQ_PROCESSING_QUEUE}
      routing-key: ${RABBITMQ_PROCESSING_ROUTING_KEY}
    email-embedding:
      exchange: ${RABBITMQ_EMBEDDING_EXCHANGE}
      queue: ${RABBITMQ_EMBEDDING_QUEUE}
      routing-key: ${RABBITMQ_EMBEDDING_ROUTING_KEY}

email-storage:
  provider: ${EMAIL_STORAGE_PROVIDER}
  local-base-path: ${EMAIL_STORAGE_LOCAL_BASE_PATH}

embedding-vendor:
  provider: ${EMBEDDING_PROVIDER}
  ollama-url: ${EMBEDDING_OLLAMA_URL}
  model: ${EMBEDDING_MODEL}
  num-ctx: 8192
  max-chars: 30000

sanitization:
  quoted-text-patterns:
    - "(?m)^On .{10,80}<[^>]+>\\s*wrote:\\s*$"
    - "(?m)^On .{10,80} wrote:\\s*$"
    - "(?m)^-{3,}\\s*Original Message\\s*-{3,}"
    - "(?ms)^From:\\s.*\\nSent:\\s.*\\nTo:\\s.*"
    - "(?m)^_{3,}\\s*$"
  signature-patterns:
    - "^-- ?$"
    - "(?i)^Sent from my (iPhone|iPad|Galaxy|Samsung)"
    - "(?i)^Sent from Mail for Windows"
    - "(?i)^Get Outlook for (iOS|Android)"
    - "(?i)^Sent from Yahoo Mail"
  sign-off-phrases:
    - "best regards"
    - "kind regards"
    - "warm regards"
    - "regards"
    - "thanks"
    - "thank you"
    - "cheers"
    - "sincerely"
    - "respectfully"
    - "best"
  disclaimer-keywords:
    - "confidential"
    - "privileged"
    - "intended recipient"
    - "unauthorized"
    - "disclaimer"
    - "this email"
    - "this message"
    - "please notify"
    - "delete this"
    - "legally privileged"

logging:
  level:
    com.inboxintelligence.processor: DEBUG
    org.springframework.amqp: INFO
